name: Build EDGY ESP (Direct .dylib)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Theos (Clean)
        run: |
          # Bersihkan folder lama
          rm -rf ./theos
          
          # Clone Theos
          git clone --recursive https://github.com/theos/theos.git ./theos
          
          # Download SDKs arm64
          cd ./theos
          curl -L https://github.com/theos/sdks/archive/master.zip -o sdks.zip
          unzip -q sdks.zip
          mkdir -p sdks
          mv sdks-master/* sdks/ 2>/dev/null || true
          rm -rf sdks-master sdks.zip
          
          # Set environment
          echo "$(pwd)/bin" >> $GITHUB_PATH
          echo "THEOS=$(pwd)" >> $GITHUB_ENV
          
      - name: Build Tweak
        run: |
          cd tweak
          make clean
          make package FINALPACKAGE=1
          
      - name: Extract .dylib from .deb
        run: |
          cd tweak
          mkdir -p extracted
          dpkg-deb -x *.deb extracted/ 2>/dev/null || true
          find extracted -name "*.dylib" -exec cp {} ./ \;
          ls -la *.dylib || echo "No dylib found"
          
      - name: Upload .dylib
        uses: actions/upload-artifact@v4
        with:
          name: EdgyESP.dylib
          path: tweak/*.dylib
          
      - name: Upload .deb (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: EdgyESP.deb
          path: tweak/*.deb
