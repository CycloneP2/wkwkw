name: Compile EDGY ESP (Direct .dylib)

on:
  workflow_dispatch:
    inputs:
      tweak_name:
        description: 'Nama file dylib output'
        required: true
        default: 'EdgyESP'
        type: string

jobs:
  build-dylib:
    name: Build Direct .dylib for Sideload
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: './theos'
          theos-src: 'https://github.com/theos/theos'
          theos-sdks: 'https://github.com/theos/sdks'

      - name: Build .dylib directly
        run: |
          cd tweak
          make clean
          make package FINALPACKAGE=1
          # Extract .dylib from .deb
          mkdir -p extracted
          dpkg-deb -x *.deb extracted/
          cp extracted/Library/MobileSubstrate/DynamicLibraries/*.dylib .
          
      - name: Upload .dylib (Direct)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.tweak_name }}.dylib
          path: tweak/*.dylib

      - name: Upload .deb (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.tweak_name }}.deb
          path: tweak/*.deb
