name: Compile EDGY ESP (Direct .dylib)

on:
  workflow_dispatch:
    inputs:
      tweak_name:
        description: 'Nama file dylib output'
        required: true
        default: 'EdgyESP'
        type: string

jobs:
  build-dylib:
    name: Build Direct .dylib for Sideload
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential lzma liblzma-dev libssl-dev
          git clone --recursive https://github.com/theos/theos.git $GITHUB_WORKSPACE/theos
          git clone https://github.com/theos/sdks.git $GITHUB_WORKSPACE/theos/sdks
          echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      - name: Build .dylib
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          cd tweak
          make clean
          make package FINALPACKAGE=1
          
          # Extract .dylib from .deb
          mkdir -p extracted
          dpkg-deb -x *.deb extracted/
          cp extracted/Library/MobileSubstrate/DynamicLibraries/*.dylib .
          echo "✅ Build successful"
          
      - name: Upload .dylib (Direct)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.tweak_name }}.dylib
          path: tweak/*.dylib

      - name: Upload .deb (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.tweak_name }}.deb
          path: tweak/*.deb
